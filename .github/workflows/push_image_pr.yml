name: Push PR image to quay.io
on:
  workflow_run:
    workflows: ["Build PR image and upload artifact"]
    types:
      - completed

permissions:
  pull-requests: write

env:
  WF_REGISTRY_USER: netobserv+github_ci
  WF_REGISTRY: quay.io/netobserv
  WF_IMAGE: netobserv-ebpf-agent
  WF_BC_IMAGE: ebpf-bytecode

jobs:
  push-pr-image:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    name: push PR image
    runs-on: ubuntu-latest
    steps:
      - name: extract PR data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_json=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.event.workflow_run.head_repository.owner.login }}:${{ github.event.workflow_run.head_branch }}")
          len=$(echo ${pr_json} | jq '. | length')
          if [[ "$len" != "1" ]]; then
            echo "::error::Could not get a unique PR, aborting"
            exit 1
          fi
          echo "pr_id=$(echo ${pr_json} | jq '.[0].number')" >> $GITHUB_ENV
          head_sha=$(echo ${pr_json} | jq -r '.[0].head.sha')
          echo "short_sha=$(echo ${head_sha::8})" >> $GITHUB_ENV
          echo "main_image=${{ env.WF_REGISTRY }}/${{ env.WF_IMAGE }}:${head_sha::8}" >> $GITHUB_ENV
          echo "bc_image=${{ env.WF_REGISTRY }}/${{ env.WF_BC_IMAGE }}:${head_sha::8}" >> $GITHUB_ENV
      - name: download artifact
        uses: actions/download-artifact@v8
        with:
          name: pr
          run-id: ${{github.event.workflow_run.id }}
          github-token: ${{secrets.GITHUB_TOKEN}}
      - name: load images
        run: |
          docker load --input ./ebpf-agent.tar
          docker load --input ./ebpf-agent-bc.tar
          docker image tag ${{ env.WF_REGISTRY }}/${{ env.WF_IMAGE }}:tmp ${{ env.main_image }}
          docker image tag ${{ env.WF_REGISTRY }}/${{ env.WF_BC_IMAGE }}:tmp ${{ env.bc_image }}
      - name: docker login to quay.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ env.WF_REGISTRY_USER }}
          password: ${{ secrets.QUAY_SECRET }}
          registry: quay.io
      - name: push images
        run: |
          DOCKER_BUILDKIT=1 docker push ${{ env.main_image }}
          DOCKER_BUILDKIT=1 docker push ${{ env.bc_image }}
      - uses: actions/github-script@v9
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            var fs = require('fs');
            github.rest.issues.createComment({
              issue_number: ${{ env.pr_id }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `New images:
            \`\`\`bash
            ${{ env.main_image }}
            ${{ env.bc_image }}
            \`\`\`

            They will expire in two weeks.

            To deploy this build, run from the operator repo, assuming the operator is running:
            \`\`\`bash
            USER=netobserv VERSION=${{ env.short_sha }} make set-agent-image
            \`\`\`
            `
            })
